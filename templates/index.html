<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <h2>Spotify <img src="../assets/logo/logo.png" width="40px" height="40px" alt="Spotify Logo"></h2>
            
        </div>

        <nav>
            <ul>
                <li><i class="fa-solid fa-house"></i> Home</li>
                <li><i class="fa-solid fa-magnifying-glass"></i> Search</li>
                <li><i class="fa-solid fa-book"></i> Your Library</li>
                <li><i class="fa-solid fa-heart"></i> Liked Songs</li>
                <li><i class="fa-solid fa-plus"></i> Create Playlist</li>
                <li id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i>Logout</li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Top Bar -->
        <header class="top-bar">
            <div class="nav-buttons">
                <button>
                    <i class="fa-solid fa-chevron-left"></i>
                </button>

                <button>
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>

            <div class="profile">
                <i class="fa-solid fa-user"></i>
                <span id="profileName">User</span>
            </div>
        </header>

        <!-- Recently Played -->
        <section class="section">
            <h2>Recently Played</h2>

            <div class="card-container">

                <div class="card">
                    <img src="../assets/covers/cover6.jpg" alt="">
                    <h4>Daily Mix 1</h4>
                    <p>Your favorite songs</p>
                </div>

                <div class="card">
                    <img src="../assets/covers/cover7.jpg" alt="">
                    <h4>Workout Hits</h4>
                    <p>Gym motivation</p>
                </div>

                <div class="card">
                    <img src="../assets/covers/cover8.jpg" alt="">
                    <h4>Top 50</h4>
                    <p>Trending music</p>
                </div>

                <div class="card">
                    <img src="../assets/covers/cover9.jpg" alt="">
                    <h4>Chill Mix</h4>
                    <p>Relaxing tracks</p>
                </div>

            </div>
        </section>

        <!-- Dynamic Songs Section -->
        <section class="section">
            <h2>Popular Songs</h2>

            <div class="card-container" id="songContainer">

            </div>
        </section>

    </main>

    <!-- Music Player -->
    <footer id="musicPlayer" class="player">

        <!-- Song Info -->
        <div class="song-info">

            <img
                id="playerCover"
                src="../assets/covers/cover1.jpg"
                alt="Song Cover"
            >

            <div>
                <h4 id="playerTitle">
                    No Song Selected
                </h4>

                <p id="playerArtist">
                    Select a song to play
                </p>
            </div>

        </div>

        <!-- Controls -->
        <div class="player-controls">

            <div>
                <button id="prevBtn">
                    <i class="fa-solid fa-backward-step"></i>
                </button>

                <button id="playPauseBtn" class="play-btn">
                    <i class="fa-solid fa-play"></i>
                </button>

                <button id="nextBtn">
                    <i class="fa-solid fa-forward-step"></i>
                </button>
            </div>

            <input
                id="progressBar"
                type="range"
                min="0"
                max="100"
                value="0"
            >

        </div>

        <!-- Volume -->
        <div class="volume">

            <i class="fa-solid fa-volume-high"></i>

            <input
                id="volumeSlider"
                type="range"
                min="0"
                max="100"
                value="80"
            >

        </div>

    </footer>
    <div id="playerOverlay" class="player-overlay">
        <div class="player-content">

            <button id="closePlayer" class="close-btn">✕</button>

            <img id="overlayImage" src="" alt="">

            <h1 id="overlayTitle"></h1>
            <p id="overlayArtist"></p>

            <input
                id="overlayProgress"
                type="range"
                min="0"
                max="100"
                value="0"
            >
            <div class="overlay-controls">
                <button id="overlayPrevBtn">
                <i class="fa-solid fa-backward-step"></i>
                </button>
                <button id="overlayPlayBtn" class="play-btn">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button id="overlayNextBtn">
                    <i class="fa-solid fa-forward-step"></i>
            </button>
        </div>
    </div>
</div>
    </div>

    <!-- Scripts -->
    <script src="../js/auth.js"></script>
    <script src="../js/songs.js"></script>
    <script src="../js/player.js"></script>
    <script src="../js/app.js"></script>

</body>
</html>
